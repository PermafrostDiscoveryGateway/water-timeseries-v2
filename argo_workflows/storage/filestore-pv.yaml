apiVersion: v1
kind: PersistentVolume
metadata:
  name: argo-filestore-pv
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 10.30.59.242  # Your Filestore IP
    path: /argo_share  # CORRECTED: Use the actual share name
  # Add mount options for better reliability
  mountOptions:
    - hard
    - nfsvers=3
    - timeo=600
    - retrans=2
    - noresvport