apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: water-timeseries-breakpoint-analysis
  namespace: argo
  annotations:
    workflows.argoproj.io/pod-keep: "OnCompletion"
spec:
  ttlStrategy:
    secondsAfterCompletion: 86400
  entrypoint: main
  imagePullSecrets:
  - name: ghcr-secret
  volumes:
  - name: water-timeseries-volume
    persistentVolumeClaim:
      claimName: argo-workflows-share  # ✅ This matches your PVC name
  - name: gcp-creds
    secret:
      secretName: personal-gcp-creds
      items:
      - key: key.json
        path: application_default_credentials.json
  - name: earth-engine-creds
    secret:
      secretName: earth-engine-creds
      items:
      - key: credentials
        path: credentials
  - name: config-file
    configMap:
      name: water-series-configmap
      items:
      - key: config.yaml
        path: config.yaml
  templates:
  - name: main
    metadata:
      labels:
        long-running-job: "true"
    container:
      image: ghcr.io/ncsa/water-timeseries-v2:ncsa
      imagePullPolicy: Always
      resources:
        requests:
          memory: "16Gi"
          cpu: "4"
          ephemeral-storage: "5Gi"
        limits:
          memory: "16Gi"
          cpu: "4"
          ephemeral-storage: "10Gi"  # Good for Autopilot

      command: ["uv", "run"]
      args:
      - "water-timeseries"
      - "breakpoint-analysis"
      - "--config-file"
      - "/app/config.yaml"
      env:
      - name: TMPDIR
        value: /data/tmp  # Add this to redirect system temp to Filestore
      - name: TEMP
        value: /data/tmp  # For Windows compatibility
      - name: TMP
        value: /data/tmp
      - name: UV_CACHE_DIR
        value: /data/.uv_cache  # ✅ Single definition, inside mounted volume
      - name: UV_LINK_MODE
        value: "hardlink"
      - name: GOOGLE_APPLICATION_CREDENTIALS
        value: /root/.config/gcloud/application_default_credentials.json
      - name: EARTHENGINE_TOKEN
        value: /root/.config/earthengine/credentials
      - name: EE_CLOUD_PROJECT
        value: "pdg-wg-workflow"
      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: POD_NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace
      - name: UV_NO_CACHE
        value: "0"

      volumeMounts:
      - name: gcp-creds
        mountPath: /root/.config/gcloud
        readOnly: true
      - name: earth-engine-creds
        mountPath: /root/.config/earthengine
        readOnly: true
      - name: water-timeseries-volume
        mountPath: /data  # ✅ This matches UV_CACHE_DIR location
      - name: config-file
        mountPath: /app/config.yaml
        subPath: config.yaml
        readOnly: true