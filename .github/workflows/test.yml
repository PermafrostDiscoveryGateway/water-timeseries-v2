name: Test GHCR Push

on:
  push:
    branches: [add-dockerfile]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push test image
        run: |
          echo "FROM alpine:latest" > Dockerfile.test
          docker build -f Dockerfile.test -t ghcr.io/${{ github.repository }}/test:${{ github.sha }} .
          docker push ghcr.io/${{ github.repository }}/test:${{ github.sha }}