{{- if .Values.ingress.enabled -}}
{{- $fullName := include "water-timeseries.fullname" . -}}
{{- $inferredHostname := .Values.ingress.hostname | default "" -}}
{{- $tlsSecretName := .Values.ingress.tlsSecretName | default "ingress-tls-cert" -}}
{{- $tlsEnabled := true -}}
{{- if hasKey .Values.ingress "tlsEnabled" -}}
{{- $tlsEnabled = .Values.ingress.tlsEnabled -}}
{{- end -}}
{{- $hasHosts := gt (len (.Values.ingress.hosts | default (list))) 0 -}}
{{- $hasTls := gt (len (.Values.ingress.tls | default (list))) 0 -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "water-timeseries.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if and $tlsEnabled (or $hasTls $inferredHostname) }}
  tls:
    {{- if $hasTls }}
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
    {{- else }}
    - hosts:
        - {{ $inferredHostname | quote }}
      secretName: {{ $tlsSecretName }}
    {{- end }}
  {{- end }}
  {{- if or $hasHosts $inferredHostname }}
  rules:
    {{- $services := .Values.services -}}
    {{- $hosts := .Values.ingress.hosts | default (list (dict "host" $inferredHostname)) }}
    {{- range $hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range $i, $svc := $services }}
          - path: {{ if eq $i 0 }}/{{ else }}/{{ $svc.name }}{{ end }}
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-{{ $svc.name }}
                port:
                  number: {{ $svc.port }}
          {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
