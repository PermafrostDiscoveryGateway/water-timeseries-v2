services:
  app:
    build: .
    image: water-timeseries-streamlit:latest
    working_dir: /app
    command:
      - streamlit
      - run
      - src/water_timeseries/dashboard/app.py
      - --server.port=8501
      - --server.address=0.0.0.0
    volumes:
      - .:/app
      # Keep image .venv; a plain .:/app mount would hide it with an empty host dir
      - /app/.venv
    ports:
      - "8501:8501"
    environment:
      MPLBACKEND: Agg